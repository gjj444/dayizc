<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#3a2418" />
  <title>城市记忆·时光珍藏 | 大邑县档案馆</title>
  <style>
    /* ============ 基础重置 ============ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { -webkit-text-size-adjust: 100%; }
    button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }
    img { max-width: 100%; display: block; }

    /* ============ 主题变量 ============ */
    :root {
      --ink: #2a1d12;            /* 墨黑 */
      --ink-soft: #5a4a3b;
      --paper: #f5ecd7;          /* 牛皮纸 */
      --paper-2: #ede0c4;
      --paper-3: #e2d2af;
      --seal: #b73229;           /* 朱红 */
      --seal-deep: #8e2520;
      --gold: #b08542;           /* 铜金 */
      --line: #c9b691;
      --line-soft: #d8c7a4;

      --font-serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", "STSong", "SimSun", serif;
      --font-sans:  -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB",
                    "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      font-family: var(--font-sans);
      color: var(--ink);
      background: var(--paper);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* 整页纸张纹理 */
    body::before {
      content: "";
      position: fixed; inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(circle at 20% 10%, rgba(176,133,66,.06) 0, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(183,50,41,.05) 0, transparent 40%),
        repeating-linear-gradient(0deg, transparent 0 3px, rgba(90,74,59,.018) 3px 4px);
      z-index: 0;
    }

    .page { position: relative; z-index: 1; }

    /* ============ 顶部 Hero ============ */
    .hero {
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 6rem 1.5rem 4rem;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(42,29,18,.55) 0%, rgba(42,29,18,.75) 100%),
        radial-gradient(ellipse at top, #5a3a22 0%, #2a1d12 70%);
      color: #f5ecd7;
    }
    .hero::after {
      content: "";
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(90deg, transparent 0 6px, rgba(245,236,215,.03) 6px 7px);
      pointer-events: none;
    }

    .museum-mark {
      font-family: var(--font-serif);
      font-size: .95rem;
      letter-spacing: .5em;
      padding-left: .5em;
      opacity: .85;
      margin-bottom: 2rem;
      position: relative;
    }
    .museum-mark::before, .museum-mark::after {
      content: ""; display: inline-block;
      width: 28px; height: 1px;
      background: currentColor;
      vertical-align: middle;
      margin: 0 1em;
      opacity: .5;
    }

   .exhibition-title {
    font-family: var(--font-serif);
    font-size: clamp(2.2rem, 9vw, 3.6rem);
    font-weight: 600;
    letter-spacing: .15em;
    line-height: 1.3;
    margin-bottom: 1.5rem;
    padding-left: .15em;
    white-space: nowrap;
}

/* 手机窄屏适配 */
@media (max-width: 480px) {
    .exhibition-title {
        font-size: clamp(1.8rem, 8vw, 2.8rem);
        letter-spacing: 0.08em;
        padding-left: 0;
    }
    .exhibition-title .dot {
        width: 0.3em;
        height: 0.3em;
        margin: 0 0.2em 0.1em;
    }
}
    .exhibition-title .dot {
      display: inline-block;
      width: .35em; height: .35em;
      background: var(--seal);
      border-radius: 50%;
      vertical-align: middle;
      margin: 0 .4em .15em;
    }

    .exhibition-sub {
      font-size: 1rem;
      opacity: .8;
      letter-spacing: .2em;
      padding-left: .2em;
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: .8rem;
      letter-spacing: .3em;
      opacity: .6;
      animation: bob 2.2s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translate(-50%, 0); opacity: .4; }
      50%      { transform: translate(-50%, 8px); opacity: .8; }
    }

    /* 印章装饰 */
    .seal-stamp {
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      width: 56px; height: 56px;
      border: 2px solid var(--seal);
      color: var(--seal);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      font-size: 1.4rem;
      letter-spacing: 0;
      transform: rotate(-8deg);
      opacity: .85;
      border-radius: 4px;
    }
    .seal-stamp small {
      position: absolute;
      font-size: .55rem;
      letter-spacing: .1em;
      bottom: -1.2em;
      left: 50%;
      transform: translateX(-50%) rotate(8deg);
      color: var(--seal);
      opacity: .7;
      white-space: nowrap;
    }

    /* ============ 主体内容 ============ */
    main { padding: 0 1.25rem; }

    .section-intro {
      text-align: center;
      padding: 4rem 1rem 2rem;
    }
    .section-intro .line {
      display: inline-block;
      width: 40px; height: 1px;
      background: var(--ink-soft);
      vertical-align: middle;
      margin: 0 1em;
      opacity: .5;
    }
    .section-intro .label {
      font-family: var(--font-serif);
      letter-spacing: .4em;
      color: var(--ink-soft);
      font-size: .9rem;
    }

    .hall {
      max-width: 640px;
      margin: 0 auto 1.5rem;
      background: #fbf6e7;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 2rem 1.5rem 1.75rem;
      position: relative;
      box-shadow: 0 2px 0 var(--line-soft), 0 8px 24px -16px rgba(42,29,18,.25);
      opacity: 0;
      transform: translateY(24px);
      transition: opacity .8s ease, transform .8s ease;
    }
    .hall.in-view { opacity: 1; transform: none; }

    .hall-num {
      font-family: var(--font-serif);
      font-size: 3rem;
      font-weight: 600;
      color: var(--seal);
      line-height: 1;
      letter-spacing: .05em;
      margin-bottom: .5rem;
    }
    .hall-num.preface { color: var(--gold); }

    .hall-title {
      font-family: var(--font-serif);
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: .12em;
      margin-bottom: .35rem;
      color: var(--ink);
    }
    .hall-sub {
      font-family: var(--font-serif);
      color: var(--ink-soft);
      font-size: 1rem;
      letter-spacing: .25em;
      margin-bottom: 1rem;
    }
    .hall-period {
      display: inline-block;
      font-family: var(--font-serif);
      font-size: .8rem;
      letter-spacing: .15em;
      color: var(--seal);
      border: 1px solid var(--seal);
      padding: .15em .8em;
      border-radius: 2px;
      margin-bottom: 1rem;
    }
    .hall-desc {
      color: var(--ink-soft);
      font-size: .95rem;
      line-height: 1.85;
      margin-bottom: 1.5rem;
      min-height: 1em;
    }

    /* ============ 音频播放器 ============ */
    .player {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.1rem;
      background: linear-gradient(180deg, #f0e3c1 0%, #e8d7ad 100%);
      border: 1px solid var(--line);
      border-radius: 999px;
    }
    .player-btn {
      flex: 0 0 auto;
      width: 48px; height: 48px;
      border-radius: 50%;
      background: var(--seal);
      color: #f5ecd7;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      transition: transform .15s ease, background .2s ease;
      box-shadow: 0 4px 12px -4px rgba(142,37,32,.5);
    }
    .player-btn:active { transform: scale(.92); }
    .player-btn.playing { background: #1a1008; }
    .player-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .player-btn .icon-pause { display: none; }
    .player-btn.playing .icon-play { display: none; }
    .player-btn.playing .icon-pause { display: block; }

    .player-body { flex: 1 1 auto; min-width: 0; }
    .player-label {
      font-size: .8rem;
      color: var(--ink-soft);
      letter-spacing: .15em;
      margin-bottom: .25rem;
    }
    .player-bar {
      position: relative;
      height: 4px;
      background: var(--line-soft);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: .25rem;
    }
    .player-progress {
      position: absolute;
      inset: 0 100% 0 0;
      background: var(--seal);
      transition: right .1s linear;
    }
    .player-thumb {
    position: absolute;
    top: 50%;
    right: 0;
    width: 14px;
    height: 14px;
    background: var(--seal);
    border: 2px solid #f5ecd7;
    border-radius: 50%;
    transform: translate(50%, -50%);
    pointer-events: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.25);
    z-index: 2;
}
    .player-time {
      display: flex;
      justify-content: space-between;
      font-size: .7rem;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
    }

    /* ============ 底部分隔与页脚 ============ */
    .end-mark {
      text-align: center;
      padding: 3rem 1rem 1rem;
      color: var(--ink-soft);
      font-family: var(--font-serif);
      letter-spacing: .4em;
      font-size: .85rem;
    }
    .end-mark::before, .end-mark::after {
      content: "·";
      margin: 0 1em;
      color: var(--gold);
    }

    footer {
      text-align: center;
      padding: 2rem 1.5rem 3rem;
      color: var(--ink-soft);
      font-size: .8rem;
      line-height: 1.8;
    }
    footer .museum {
      font-family: var(--font-serif);
      letter-spacing: .3em;
      font-size: .9rem;
      color: var(--ink);
      margin-bottom: .5rem;
    }

    /* ============ 大屏适配 ============ */
    @media (min-width: 720px) {
      main { padding: 0 2rem; }
      .hall { padding: 2.5rem 2.5rem 2.25rem; }
      .hall-title { font-size: 1.85rem; }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- ============ 顶部 ============ -->
    <header class="hero">
      <div class="seal-stamp">档<small>DAYI</small></div>
      <div class="museum-mark">大邑县档案馆</div>
      <h1 class="exhibition-title">城市记忆<span class="dot"></span>时光珍藏</h1>
      <div class="exhibition-sub">扫码聆听 · 城市的百年回响</div>
      <div class="scroll-hint">向下滑动 ↓</div>
    </header>

    <main>
      <div class="section-intro">
        <span class="line"></span>
        <span class="label">五 个 展 厅</span>
        <span class="line"></span>
      </div>

      <!-- 卡片会由 JS 渲染 -->
      <div id="halls"></div>

      <div class="end-mark">聆听即抵达</div>
    </main>

    <footer>
      <div class="museum">大邑县档案馆</div>
      <div>每 一 段 声 音 ， 都 是 时 光 的 回 响</div>
    </footer>
  </div>

  <script>
    /* ============================================================
       展陈数据 —— 替换 audio 字段为你的 MP3 路径即可
       支持本地相对路径（./audio/xxx.mp3）或完整 URL
       ============================================================ */
    const HALLS = [
      {
        num: '序',
        preface: true,
        title: '序厅',
        sub: '时光之门',
        period: '前 言',
        desc: '',
        audio: 'https://dyxdazc-1341491087.cos.ap-chengdu.myqcloud.com/%E5%BA%8F%E5%8E%85%EF%BC%88%E8%A3%81%E5%89%AA1s%EF%BC%89.mp3',
        audioLabel: '序厅讲解'
      },
      {
        num: '贰',
        title: '第二展厅',
        sub: '峥嵘岁月',
        period: '1921 — 1949',
        desc: '【展厅简介】革命风云激荡的年代，记录大邑儿女在民族救亡图存中的奋斗与牺牲。',
        audio: 'https://dyxdazc-1341491087.cos.ap-chengdu.myqcloud.com/%E7%AC%AC%E4%BA%8C%E5%B1%95%E5%8E%85%EF%BC%88%E8%A3%81%E5%89%AA1s%EF%BC%89.mp3',
        audioLabel: '第二展厅讲解'
      },
      {
        num: '叁',
        title: '第三展厅',
        sub: '艰辛探索',
        period: '1949 — 1978',
        desc: '【展厅简介】建设年代的记忆，记录新中国成立后大邑在百废待兴中的探索与前行。',
        audio: 'https://dyxdazc-1341491087.cos.ap-chengdu.myqcloud.com/%E7%AC%AC%E4%B8%89%E5%B1%95%E5%8E%85%EF%BC%88%E8%A3%81%E5%89%AA1s%EF%BC%89.mp3',
        audioLabel: '第三展厅讲解'
      },
      {
        num: '肆',
        title: '第四展厅',
        sub: '改革潮起',
        period: '1978 — 2012',
        desc: '【展厅简介】春天的故事，记录改革开放以来大邑的变迁、突破与时代浪潮。',
        audio: 'https://dyxdazc-1341491087.cos.ap-chengdu.myqcloud.com/%E7%AC%AC%E5%9B%9B%E5%B1%95%E5%8E%85%EF%BC%88%E8%A3%81%E5%89%AA1s%EF%BC%89.mp3',
        audioLabel: '第四展厅讲解'
      },
      {
        num: '伍',
        title: '第五展厅',
        sub: '时代新篇',
        period: '2012 — 至今',
        desc: '【展厅简介】新时代的华章，记录大邑在新征程上的高质量发展与人民生活的幸福图景。',
        audio: 'https://dyxdazc-1341491087.cos.ap-chengdu.myqcloud.com/%E7%AC%AC%E4%BA%94%E5%B1%95%E5%8E%85%EF%BC%88%E8%A3%81%E5%89%AA1s%EF%BC%89.mp3',
        audioLabel: '第五展厅讲解'
      }
    ];

    /* ============ 渲染卡片 ============ */
    const hallsRoot = document.getElementById('halls');
    hallsRoot.innerHTML = HALLS.map((h, i) => `
      <section class="hall" data-index="${i}">
        <div class="hall-num ${h.preface ? 'preface' : ''}">${h.num}</div>
        <h2 class="hall-title">${h.title}</h2>
        <div class="hall-sub">${h.sub}</div>
        ${h.period ? `<div class="hall-period">${h.period}</div>` : ''}
        <p class="hall-desc">${h.desc}</p>
        <div class="player" data-audio="${h.audio}">
          <button class="player-btn" aria-label="播放 ${h.audioLabel}">
            <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
          </button>
          <div class="player-body">
            <div class="player-label">${h.audioLabel}</div>
            <div class="player-bar">
  <div class="player-progress"></div>
  <div class="player-thumb"></div>
</div>
            <div class="player-time">
              <span class="t-cur">0:00</span>
              <span class="t-dur">--:--</span>
            </div>
          </div>
        </div>
      </section>
    `).join('');

    /* ============ 播放器逻辑 ============ */
    function fmt(sec) {
      if (!isFinite(sec)) return '--:--';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    const players = document.querySelectorAll('.player');
    let current = null; // 当前正在播放的 audio 元素

    players.forEach(p => {
      const url = p.dataset.audio;
      const btn = p.querySelector('.player-btn');
      const prog = p.querySelector('.player-progress');
      const tCur = p.querySelector('.t-cur');
      const tDur = p.querySelector('.t-dur');

      const audio = new Audio();
      audio.preload = 'metadata';
      audio.src = url;
      // 移动端 autoplay 限制下，加这一行可让控件以"内联播放"形式生效
      audio.setAttribute('playsinline', '');
      audio.playsInline = true;

      audio.addEventListener('loadedmetadata', () => {
        tDur.textContent = fmt(audio.duration);
      });
      audio.addEventListener('timeupdate', () => {
        const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
        prog.style.right = (100 - pct) + '%';
        if (thumb) thumb.style.right = (100 - pct) + '%';
        tCur.textContent = fmt(audio.currentTime);
      });
      audio.addEventListener('ended', () => {
        btn.classList.remove('playing');
        prog.style.right = '100%';
        tCur.textContent = '0:00';
        if (current === audio) current = null;
      });
      audio.addEventListener('error', () => {
        tDur.textContent = '音频未就绪';
        btn.style.opacity = .4;
        btn.disabled = true;
      });

      btn.addEventListener('click', () => {
        if (audio.error || btn.disabled) return;
        if (current && current !== audio) {
          current.pause();
          document.querySelectorAll('.player-btn.playing').forEach(b => b.classList.remove('playing'));
        }
        if (audio.paused) {
          audio.play().then(() => {
            btn.classList.add('playing');
            current = audio;
          }).catch(() => { /* 用户未交互或路径错误 */ });
        } else {
          audio.pause();
          btn.classList.remove('playing');
          if (current === audio) current = null;
        }
      });

      // 点击进度条跳转
            const bar = p.querySelector('.player-bar');
      const thumb = p.querySelector('.player-thumb');

      /* 计算点击/拖动位置并设置进度 */
      function seek(e) {
        if (!audio.duration) return;
        const rect = bar.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let ratio = (clientX - rect.left) / rect.width;
        ratio = Math.max(0, Math.min(1, ratio));
        audio.currentTime = ratio * audio.duration;
      }

      /* 点击进度条直接跳转 */
      bar.addEventListener('click', seek);

      /* 拖动进度条 */
      let dragging = false;
      bar.addEventListener('mousedown', (e) => {
        dragging = true;
        seek(e);
      });
      bar.addEventListener('touchstart', (e) => {
        dragging = true;
        seek(e);
      }, { passive: false });

      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        seek(e);
      });
      document.addEventListener('touchmove', (e) => {
        if (!dragging) return;
        seek(e);
      }, { passive: false });

      document.addEventListener('mouseup', () => { dragging = false; });
      document.addEventListener('touchend', () => { dragging = false; });
    });

    /* ============ 滚动入场动画 ============ */
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          en.target.classList.add('in-view');
          io.unobserve(en.target);
        }
      });
    }, { threshold: 0.15 });
    document.querySelectorAll('.hall').forEach(h => io.observe(h));
  </script>
</body>
</html>
